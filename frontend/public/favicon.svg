<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f0f1a"/>

  <!-- Ballot box body -->
  <rect x="6" y="14" width="20" height="13" rx="2" fill="none" stroke="#f97316" stroke-width="2"/>

  <!-- Slot on top of box -->
  <rect x="13" y="12" width="6" height="2" rx="1" fill="#f97316"/>

  <!-- Ballot paper going into slot -->
  <rect x="14.5" y="4" width="3" height="9" rx="1" fill="white"/>

  <!-- Arrow tip on ballot -->
  <path d="M13 9 L16 12 L19 9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
